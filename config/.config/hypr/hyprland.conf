
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,1920x1080@144,0x0,1
monitor=HDMI-A-1,3840x2160@60,1920x0,1 # , mirror, eDP-1, bitdepth, 10


###################
### MY PROGRAMS ###
###################

source=~/.config/hypr/rose-pine.conf

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
#$fileManager = dolphin
$menu = rofi -show drun
$reset = hyprctl dispatch submap reset &&


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

exec-once = waybar & hyprpaper
exec-once = nm-applet &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hypridle
# exec-once = clipse -listen
exec-once = swaync
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprsunset

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

cursor {
    sync_gsettings_theme = no
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 12

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $iris $love 225deg
    col.inactive_border = $muted

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 8
        passes = 3

        vibrancy = 0.1696
    }
}

layerrule {
  name = no_anim_for_selection
  no_anim = on
  match:namespace = selection
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = easeinoutsine, 0.37, 0, 0.63, 1
    bezier = snappyReturn, 0.4, 0.9, 0.6, 1.0
    bezier = bounce, 0.4, 0.9, 0.6, 1.0

    # Windows
    animation = windowsIn, 1, 4, snappyReturn, slidevert right
    animation = windowsOut, 1, 5, snappyReturn, slide
    animation = windowsMove, 1, 4, bounce, slide

    # Fading
    animation = fade, 1, 2.5, fluent_decel

	animation = fadeLayersIn, 0
    animation = border, 0


	# Layers
	animation = layersOut, 1, 1, default
	animation = layersIn, 1, 2, easeinoutsine, popin

    # Workspaces
    animation = workspaces, 1, 3, fluent_decel, slidefade 30% # styles: slide, slidevert, fade, slidefade, slidefadevert
    # animation = workspaces, 1, 3, fluent_decel, slidefadevert 30% # styles: slide, slidevert, fade, slidefade, slidefadevert

	animation = specialWorkspace, 1, 2, fluent_decel, slidefade 10%
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

group {
    col.border_active = $pine $gold 225deg
    col.border_inactive = $muted

    groupbar {
        enabled = false
    }
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = br, gr
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    scroll_factor = 1

    repeat_delay = 300
    accel_profile = flat

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, GTK_IM_MODULE=simple $terminal
bind = SUPER_SHIFT, Q, exec, zen-browser
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
#bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, B, exec, killall -SIGUSR1 waybar
# bind = $mainMod, Y, exec, ghostty --class=com.example.clipse --command=clipse

bind = SUPER_SHIFT, P, exec, grim -g "$(slurp)" ~/Imagens/$(date +'%Y%m%d_%Hh%Mm%Ss_grim.png') # dwindle
bind = $mainMod, E, exec, grim -g "$(slurp)" - | wl-copy
# bind = SUPER_SHIFT, P, exec, bash -c 'area=$(slurp); sleep 0.8; arquivo=~/Imagens/$(date +"%Y%m%d_%Hh%Mm%Ss_grim.png"); grim -g "$area" "$arquivo" && notify-send "Captura de Tela" "Imagem salva com sucesso!" -i "$arquivo"'
# bind = $mainMod, E, exec, bash -c 'area=$(slurp); sleep 0.8; grim -g "$area" - | wl-copy && notify-send "Captura de Tela" "Copiada para a área de transferência!"'
bind = SUPER_SHIFT, E, exec, ~/dotfiles/scripts/printAndEdit

bind = SUPER_SHIFT, W, togglegroup, # dwindle
bind = $mainMod, W, changegroupactive, # dwindle
bind = $mainMod, O, movewindoworgroup, l # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = ALT, R, submap, resize

submap = resize

binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10

bind = , escape, submap, reset

submap = reset

bind = ALT, T, submap, themes

submap = themes

binde = , Z, exec, $reset ~/dotfiles/scripts/changeZenBrowserTheme

bind = , escape, submap, reset

submap = reset

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

windowrule {
    name = pavucontrol_window
    match:class = ^(org.pulseaudio.pavucontrol)$

    float = on
    size = 1000 650
    center = on
}

windowrule {
    name = nm-connection-editor_window
    match:class = ^(nm-connection-editor)$

    float = on
    size = 900 500
    center = on
}

windowrule {
    name = biblioteca_window
    match:title = ^Biblioteca$

    float = on
    size = 1000 650
    center = on
}

windowrule {
    name = figure_window
    match:title = ^Figure [0-9]

    float = on
    size = 1000 800
    center = on
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = clipse_window
    match:class = (com.example.clipse)

    float = on
    size = 800 500
    stay_focused = on
    center = on
}

windowrule {
    name = gimp_window
    match:class = (gimp)

    float = on
    size = 1280 720
    center = on
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# workspace=1, monitor:eDP-1, persistent:true, default:true
# workspace=2, monitor:HDMI-A-1, persistent:true, default:true
